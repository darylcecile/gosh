name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: vet + test (-race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.11'
          check-latest: true
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race ./...

  importcheck:
    name: import discipline (no os/exec; net only in netcmd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.11'
          check-latest: true
      - name: import allow-list test
        run: go test ./internal/importcheck/...

  fuzz:
    name: fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.11'
          check-latest: true
      - name: fuzz run script
        run: go test ./hardening/ -run x -fuzz FuzzRunScript -fuzztime 30s
      - name: fuzz in-memory FS paths
        run: go test ./hardening/ -run x -fuzz FuzzInMemoryFSPaths -fuzztime 30s

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.11'
          check-latest: true
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...
